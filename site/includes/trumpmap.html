<script>
(function () {
  var mapEl = document.getElementById("trump-map");
  if (!mapEl) return;

  var map = L.map("trump-map", { zoomControl: false }).setView([39.5, -98.35], 4);
  L.control.zoom({ position: "bottomright" }).addTo(map);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap",
    maxZoom: 12
  }).addTo(map);
  // Keep popups clear of map edges so the +/- controls and caption never overlap.
  var popupOpts = { autoPanPadding: [60, 80] };

  var eraColors = {
    "campaign-2016":     "#8C5E2A",
    "potus-first-term":  "#0A2540",
    "post-presidency":   "#6E4C7A",
    "campaign-2024":     "#8B1E3F",
    "potus-second-term": "#C9A961"
  };

  fetch("data/locations.json")
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (payload) {
      if (!payload) {
        document.getElementById("journey-caption").textContent =
          "Map data not yet generated — run scripts/fetch_rallies.py.";
        return;
      }
      var stops = payload.stops || [];
      var markers = [];
      var pathPoints = [];

      stops.forEach(function (s) {
        var color = eraColors[s.phase] || "#0A2540";
        var m = L.circleMarker([s.lat, s.lng], {
          radius: 6, color: color, weight: 2, fillColor: color, fillOpacity: 0.6
        }).addTo(map);
        m.bindPopup(
          "<b>" + (s.label || s.city) + "</b><br>" +
          (s.date ? s.date + "<br>" : "") +
          (s.type || ""),
          popupOpts
        );
        markers.push({ m: m, stop: s });
        pathPoints.push([s.lat, s.lng]);
      });

      if (pathPoints.length > 1) {
        L.polyline(pathPoints, {
          color: "#C9A961", weight: 1.5, opacity: 0.5, dashArray: "4,6"
        }).addTo(map);
      }

      // Play journey
      var playBtn = document.getElementById("play-journey");
      var caption = document.getElementById("journey-caption");
      var speedSel = document.getElementById("journey-speed");
      // tick = ms between stops; fly = flyTo duration in seconds
      var SPEEDS = {
        slow:   { tick: 3000, fly: 1.6 },
        normal: { tick: 1400, fly: 1.0 },
        fast:   { tick:  700, fly: 0.6 }
      };
      function currentSpeed() {
        return SPEEDS[(speedSel && speedSel.value) || "slow"] || SPEEDS.slow;
      }
      var idx = 0, timer = null;
      function stopJourney() {
        if (timer) { clearTimeout(timer); timer = null; }
        playBtn.textContent = "▶ Play Journey";
      }
      function step() {
        if (idx >= markers.length) {
          stopJourney();
          caption.textContent = "Done.";
          return;
        }
        var item = markers[idx++];
        var s = currentSpeed();
        map.flyTo([item.stop.lat, item.stop.lng], 6, { duration: s.fly });
        map.once("moveend", function () { item.m.openPopup(); });
        caption.textContent = (item.stop.date || "") + " · " + (item.stop.label || item.stop.city);
        // Re-read speed each tick so the dial takes effect mid-play.
        timer = setTimeout(step, s.tick);
      }
      if (playBtn) {
        playBtn.addEventListener("click", function () {
          if (timer) { stopJourney(); return; }
          idx = 0;
          playBtn.textContent = "■ Stop";
          step();
        });
      }
    });
})();
</script>
